  /api/orders/{id}/pay:
    parameters:
      - $ref: "#/components/parameters/OrderId"

    post:
      tags:
        - Payments
      summary: Inisiasi pembayaran order
      description: >
        Meminta snap_token dari Midtrans untuk order milik pengguna yang sedang login.
        Hanya berlaku untuk order dengan fulfillmentMethod DELIVERY.
        Jika snap_token yang ada di DB masih valid (< 24 jam), token lama dikembalikan
        tanpa hit Midtrans API lagi. Jika sudah expired, token baru di-request dan
        disimpan ke DB. Gunakan snap_token yang diterima untuk menampilkan
        popup pembayaran Midtrans Snap di frontend.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token pembayaran berhasil didapatkan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiatePaymentResponse"
              example:
                message: Berhasil mendapatkan token pembayaran
                data:
                  snap_token: "abc123token-xyz..."
                  payment_url: "https://app.sandbox.midtrans.com/snap/v3/redirection/abc123token-xyz"
                  order_number: "ORD-20260624-1780000000000-4321"
                  grand_total: 152000
        "400":
          description: |
            Permintaan tidak valid. Kemungkinan penyebab:
            - Order menggunakan metode PICKUP (tidak perlu pembayaran online)
            - Order sudah dibayar (paymentStatus = PAID)
            - Order sudah dibatalkan (status = CANCELLED)
            - Status pembayaran gagal (paymentStatus = FAILED)
            - Layanan Midtrans sedang tidak tersedia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: Order dengan metode PICKUP tidak memerlukan pembayaran online
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/payments/midtrans/notification:
    post:
      tags:
        - Payments
      summary: Webhook notifikasi Midtrans
      description: >
        Endpoint ini dipanggil secara otomatis oleh server Midtrans setiap kali
        status transaksi berubah. Endpoint ini TIDAK memerlukan JWT — diproteksi
        melalui verifikasi signature key SHA512.


        Midtrans dapat mengirim notifikasi lebih dari sekali untuk transaksi yang
        sama (idempotent). Server selalu merespons HTTP 200 agar Midtrans tidak
        melakukan retry.


        **Mapping status:**

        | transaction_status | fraud_status | Aksi Backend |
        |---|---|---|
        | settlement | - | paymentStatus = PAID, status = PROCESSING |
        | capture | accept | paymentStatus = PAID, status = PROCESSING |
        | capture | challenge | Tidak ada perubahan (menunggu review Midtrans) |
        | pending | - | Tidak ada perubahan |
        | deny / expire / cancel | - | paymentStatus = FAILED, status = CANCELLED, stok dikembalikan |


        > **Catatan:** Endpoint ini tidak perlu dipanggil manual dari frontend.
        > Midtrans memanggil endpoint ini secara otomatis di background.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MidtransNotificationRequest"
            example:
              order_id: "ORD-20260624-1780000000000-4321"
              status_code: "200"
              gross_amount: "152000.00"
              transaction_status: "settlement"
              fraud_status: "accept"
              signature_key: "sha512_hash_dari_midtrans..."
              payment_type: "gopay"
              transaction_id: "abc-def-123-456"
              transaction_time: "2026-06-24 06:00:00"
              settlement_time: "2026-06-24 06:01:00"
              currency: "IDR"
      responses:
        "200":
          description: Notifikasi berhasil diproses.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: OK
        "403":
          description: Signature key tidak valid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: Invalid Midtrans signature
        "404":
          description: Order tidak ditemukan berdasarkan midtrans_order_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: Order not found

