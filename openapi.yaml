  /api/orders:
    post:
      tags:
        - Orders
      summary: Checkout cart menjadi order
      description: |
        Membuat order dari isi cart pengguna yang sedang login. Backend akan
        mengambil alamat berdasarkan address_id, menghitung subtotal barang,
        menghitung ongkir berdasarkan jarak alamat ke toko, membuat order dan
        order item, mengurangi stok produk, lalu mengosongkan cart. Alamat
        delivery harus sudah memiliki koordinat latitude dan longitude.

        Setelah order berhasil dibuat, sistem akan otomatis mengecek stok produk
        dan mengirim email notifikasi ke admin jika ada produk yang stoknya di
        bawah batas minimum (`LOW_STOCK_THRESHOLD`). Proses ini berjalan di
        background dan tidak mempengaruhi response.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
            example:
              address_id: 1
              notes: Tolong kirim sore hari
      responses:
        "201":
          description: Order berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    get:
      tags:
        - Orders
      summary: Ambil daftar order milik pengguna
      description: >
        Mengambil daftar order milik pengguna yang sedang login. Bisa difilter
        berdasarkan status, payment_status, dan fulfillment_method. Jika query
        page, limit, atau per_page dikirim, response akan menyertakan meta
        pagination.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
          example: PENDING
        - name: payment_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaymentStatus"
          example: UNPAID
        - name: fulfillment_method
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FulfillmentMethod"
          example: DELIVERY
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Nomor halaman history order. Jika dikirim, response menyertakan meta pagination.
          example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Jumlah order per halaman. Maksimal 50.
          example: 10
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          description: Alias untuk limit.
          example: 10
      responses:
        "200":
          description: Daftar order milik pengguna.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
