openapi: 3.0.3
info:
  title: Go Barokah API
  version: 1.0.0
  description: Dokumentasi REST API untuk aplikasi Go Barokah.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Health
    description: Endpoint pengecekan API.
  - name: Auth
    description: Registrasi dan login pengguna.
  - name: OTP
    description: Verifikasi email menggunakan OTP.
  - name: Users
    description: Data akun pengguna yang sedang login.
  - name: Addresses
    description: Alamat milik pengguna yang sedang login.
  - name: Products
    description: Katalog produk dan upload gambar produk.
  - name: Categories
    description: Master data kategori produk. Hanya admin atau owner.
  - name: Types
    description: Master data tipe produk. Hanya admin atau owner.
  - name: Cart
    description: Keranjang belanja pengguna. Summary cart hanya menghitung total barang; ongkir dan grand total dihitung di checkout setelah alamat dipilih.
  - name: Orders
    description: Checkout cart menjadi order dan riwayat order milik pengguna.
  - name: Admin Orders
    description: Operasional order untuk admin. Owner dapat mengakses jika masuk ke halaman admin.
  - name: Payments
    description: >
      Inisiasi pembayaran order (DELIVERY only) dan penerimaan webhook notifikasi
      dari Midtrans Payment Gateway.
  - name: Expenses
    description: Manajemen pengeluaran operasional toko (gaji, sewa, listrik, pajak, dll). Hanya owner.
  - name: Analytics
    description: Analisis keuangan toko berdasarkan rentang tanggal. Hanya owner.
  - name: Employee
    description: Manajemen akun karyawan dan admin. Hanya owner.

paths:
  /api/owner/expenses:
    post:
      tags:
        - Expenses
      summary: Tambah pengeluaran baru
      description: Mencatat pengeluaran operasional baru (gaji, sewa, listrik, pajak, dll).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseRequest"
            example:
              category: SALARY
              description: Gaji karyawan bulan Juni 2025
              amount: 3000000
              date: "2025-06-30"
      responses:
        "201":
          description: Pengeluaran berhasil ditambahkan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      tags:
        - Expenses
      summary: Ambil semua pengeluaran
      description: Mengambil daftar pengeluaran dengan filter opsional berdasarkan rentang tanggal dan kategori.
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Tanggal awal filter (YYYY-MM-DD). Inklusif.
          example: "2025-06-01"
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Tanggal akhir filter (YYYY-MM-DD). Inklusif.
          example: "2025-06-30"
        - name: category
          in: query
          schema:
            type: string
            enum: [SALARY, RENT, UTILITIES, DEPRECIATION, TAX, OTHER]
          description: Filter berdasarkan kategori pengeluaran.
          example: SALARY
      responses:
        "200":
          description: Daftar pengeluaran berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Expenses retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Expense"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/owner/expenses/{id}:
    get:
      tags:
        - Expenses
      summary: Ambil detail pengeluaran
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Detail pengeluaran berhasil diambil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Expenses
      summary: Update pengeluaran
      description: Partial update — hanya kirim field yang ingin diubah.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseRequest"
            example:
              amount: 3500000
              description: Gaji karyawan Juni 2025 (revisi)
      responses:
        "200":
          description: Pengeluaran berhasil diperbarui.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Expenses
      summary: Hapus pengeluaran
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Pengeluaran berhasil dihapus.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/owner/analytics/omzet:
    get:
      tags:
        - Analytics
      summary: Lihat omzet
      description: |
        Mengambil total omzet dari order yang sudah PAID dalam rentang tanggal yang dipilih.
        Omzet dihitung dari `itemsSubtotal` (tidak termasuk ongkos kirim).
        Juga menampilkan rincian omzet per produk diurutkan dari yang terbesar.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
      responses:
        "200":
          description: Data omzet berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Omzet data retrieved successfully
                  data:
                    $ref: "#/components/schemas/OmzetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"


  /api/owner/analytics/net-profit:
    get:
      tags:
        - Analytics
      summary: Lihat laba bersih (3 saringan)
      description: |
        Menghitung laba bersih melalui 3 saringan berurutan:
        - **Saringan 1 — Laba Kotor**: Omzet − HPP (modal barang dari `product.cost`)
        - **Saringan 2 — Laba Operasional**: Laba Kotor − Biaya Operasional (SALARY, RENT, UTILITIES, DEPRECIATION, OTHER)
        - **Saringan 3 — Laba Bersih**: Laba Operasional − Pajak (kategori TAX)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
      responses:
        "200":
          description: Data laba bersih berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Net profit data retrieved successfully
                  data:
                    $ref: "#/components/schemas/NetProfitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/owner/analytics/cash-flow:
    get:
      tags:
        - Analytics
      summary: Lihat arus kas operasi
      description: |
        Menghitung arus kas operasi dalam periode yang dipilih:
        - **Uang Masuk**: Total `grandTotal` dari order PAID (termasuk ongkos kirim)
        - **Uang Keluar**: HPP (modal barang) + semua pengeluaran yang tercatat
        - **Arus Kas Bersih**: Uang Masuk − Uang Keluar
        - **Status**: `POSITIVE` (positif), `BREAK_EVEN` (impas), atau `NEGATIVE` (negatif)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
      responses:
        "200":
          description: Data arus kas berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cash flow data retrieved successfully
                  data:
                    $ref: "#/components/schemas/CashFlowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/owner/analytics/cost-analysis:
    get:
      tags:
        - Analytics
      summary: Lihat analisis biaya
      description: |
        Menampilkan rincian lengkap semua pengeluaran dalam rentang tanggal yang dipilih:
        - Total biaya dan rata-rata per bulan
        - Rincian per kategori beserta persentase kontribusinya
        - Data tren bulanan untuk keperluan grafik
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
      responses:
        "200":
          description: Data analisis biaya berhasil diambil.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cost analysis data retrieved successfully
                  data:
                    $ref: "#/components/schemas/CostAnalysisResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/:
    get:
      tags:
        - Health
      summary: Cek status API
      responses:
        "200":
          description: API berjalan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Ok

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Registrasi akun baru
      description: Membuat akun user baru dan mengirim OTP ke email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: user@example.com
              password: secret123
              username: Budi
              phone_number: "081234567890"
      responses:
        "201":
          description: Registrasi berhasil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login pengguna
      description: Login hanya berhasil jika email sudah diverifikasi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: user@example.com
              password: secret123
      responses:
        "200":
          description: Login berhasil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/otp/request:
    post:
      tags:
        - OTP
      summary: Minta OTP email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
            example:
              email: user@example.com
      responses:
        "200":
          description: OTP berhasil dikirim.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Email OTP sent successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/otp/verify:
    post:
      tags:
        - OTP
      summary: Verifikasi OTP email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyRequest"
            example:
              email: user@example.com
              otp: "123456"
      responses:
        "200":
          description: OTP berhasil diverifikasi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Verify OTP successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users:
    patch:
      tags:
        - Users
      summary: Update akun pengguna
      description: Membutuhkan Bearer token dengan role user atau admin.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
            example:
              username: Budi Santoso
              phone_number: "081234567890"
      responses:
        "200":
          description: Akun berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/users/address:
    get:
      tags:
        - Addresses
      summary: Ambil semua alamat pengguna
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar alamat pengguna.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Addresses
      summary: Buat alamat baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressCreateRequest"
            example:
              label: Rumah
              recipient_name: Budi Santoso
              recipient_phone: "081234567890"
              address_detail: Jl. Contoh No. 1
              courier_note: Pagar warna hitam, titip ke satpam jika tidak ada orang
              latitude: -7.9666
              longitude: 112.6326
              is_default: true
      responses:
        "201":
          description: Alamat berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/users/address/{id}:
    parameters:
      - $ref: "#/components/parameters/AddressId"
    get:
      tags:
        - Addresses
      summary: Ambil alamat berdasarkan id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Detail alamat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Addresses
      summary: Update alamat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressUpdateRequest"
            example:
              label: Kantor
              courier_note: Antar ke resepsionis lantai 1
              latitude: -7.969
              longitude: 112.6312
              is_default: false
      responses:
        "200":
          description: Alamat berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Addresses
      summary: Hapus alamat
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Alamat berhasil dihapus.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/products:
    get:
      tags:
        - Products
      summary: Ambil semua produk
      responses:
        "200":
          description: Daftar produk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      tags:
        - Products
      summary: Buat produk baru
      description: Membutuhkan Bearer token dengan role admin atau owner. Gambar wajib berupa file image maksimal 2 MB.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProductCreateForm"
      responses:
        "201":
          description: Produk berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/products/{id}:
    parameters:
      - $ref: "#/components/parameters/ProductId"
    get:
      tags:
        - Products
      summary: Ambil produk berdasarkan id
      responses:
        "200":
          description: Detail produk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Products
      summary: Update produk
      description: |
        Membutuhkan Bearer token dengan role admin atau owner. Partial update —
        hanya kirim field yang ingin diubah. Gambar opsional; jika dikirim,
        gambar lama akan dihapus.

        Jika field `stock` disertakan, sistem akan otomatis mengecek semua produk
        dan mengirim email notifikasi ke admin jika ada yang stoknya di bawah
        batas minimum (`LOW_STOCK_THRESHOLD`). Proses ini berjalan di background.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProductUpdateForm"
      responses:
        "200":
          description: Produk berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Products
      summary: Hapus produk
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Produk berhasil dihapus.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/products/category:
    get:
      tags:
        - Categories
      summary: Ambil semua kategori
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar kategori.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Categories
      summary: Buat kategori
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameRequest"
            example:
              name: Beras
      responses:
        "201":
          description: Kategori berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/products/category/{id}:
    parameters:
      - $ref: "#/components/parameters/CategoryId"
    get:
      tags:
        - Categories
      summary: Ambil kategori berdasarkan id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Detail kategori.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Categories
      summary: Update kategori
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameRequest"
            example:
              name: Sembako
      responses:
        "200":
          description: Kategori berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/products/type:
    get:
      tags:
        - Types
      summary: Ambil semua tipe produk
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar tipe produk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TypeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Types
      summary: Buat tipe produk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameRequest"
            example:
              name: Premium
      responses:
        "201":
          description: Tipe berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TypeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
