          type: number
          format: float
          description: Total harga barang setelah diskon produk.
        shippingFee:
          type: number
          format: float
          description: Ongkir dummy hasil perhitungan checkout. Untuk PICKUP selalu 0.
        grandTotal:
          type: number
          format: float
          description: itemsSubtotal ditambah shippingFee.
        totalCost:
          type: number
          format: float
          description: Total modal seluruh item order.
        grossProfit:
          type: number
          format: float
          description: grandTotal dikurangi totalCost.
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        user:
          $ref: "#/components/schemas/OrderUser"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

