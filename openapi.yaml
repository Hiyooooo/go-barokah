openapi: 3.0.3
info:
  title: Go Barokah API
  version: 1.0.0
  description: Dokumentasi REST API untuk aplikasi Go Barokah.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Health
    description: Endpoint pengecekan API.
  - name: Auth
    description: Registrasi dan login pengguna.
  - name: OTP
    description: Verifikasi email menggunakan OTP.
  - name: Users
    description: Data akun pengguna yang sedang login.
  - name: Addresses
    description: Alamat milik pengguna yang sedang login.
  - name: Products
    description: Katalog produk dan upload gambar produk.
  - name: Categories
    description: Master data kategori produk. Hanya admin atau owner.
  - name: Types
    description: Master data tipe produk. Hanya admin atau owner.
  - name: Cart
    description: Keranjang belanja pengguna. Summary cart hanya menghitung total barang; ongkir dan grand total dihitung di checkout setelah alamat dipilih.
  - name: Orders
    description: Checkout cart menjadi order dan riwayat order milik pengguna.
  - name: Admin Orders
    description: Operasional order untuk admin. Owner dapat mengakses jika masuk ke halaman admin.

paths:
  /api/:
    get:
      tags:
        - Health
      summary: Cek status API
      responses:
        "200":
          description: API berjalan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Ok

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Registrasi akun baru
      description: Membuat akun user baru dan mengirim OTP ke email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: user@example.com
              password: secret123
              username: Budi
              phone_number: "081234567890"
      responses:
        "201":
          description: Registrasi berhasil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login pengguna
      description: Login hanya berhasil jika email sudah diverifikasi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: user@example.com
              password: secret123
      responses:
        "200":
          description: Login berhasil.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/otp/request:
    post:
      tags:
        - OTP
      summary: Minta OTP email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
            example:
              email: user@example.com
      responses:
        "200":
          description: OTP berhasil dikirim.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Email OTP sent successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/otp/verify:
    post:
      tags:
        - OTP
      summary: Verifikasi OTP email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyRequest"
            example:
              email: user@example.com
              otp: "123456"
      responses:
        "200":
          description: OTP berhasil diverifikasi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Verify OTP successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users:
    patch:
      tags:
        - Users
      summary: Update akun pengguna
      description: Membutuhkan Bearer token dengan role user atau admin.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
            example:
              username: Budi Santoso
              phone_number: "081234567890"
      responses:
        "200":
          description: Akun berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/users/address:
    get:
      tags:
        - Addresses
      summary: Ambil semua alamat pengguna
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar alamat pengguna.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Addresses
      summary: Buat alamat baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressCreateRequest"
            example:
              label: Rumah
              recipient_name: Budi Santoso
              recipient_phone: "081234567890"
              address_detail: Jl. Contoh No. 1
              courier_note: Pagar warna hitam, titip ke satpam jika tidak ada orang
              latitude: -7.9666
              longitude: 112.6326
              is_default: true
      responses:
        "201":
          description: Alamat berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/users/address/{id}:
    parameters:
      - $ref: "#/components/parameters/AddressId"
    get:
      tags:
        - Addresses
      summary: Ambil alamat berdasarkan id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Detail alamat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Addresses
      summary: Update alamat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressUpdateRequest"
            example:
              label: Kantor
              courier_note: Antar ke resepsionis lantai 1
              latitude: -7.969
              longitude: 112.6312
              is_default: false
      responses:
        "200":
          description: Alamat berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Addresses
      summary: Hapus alamat
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Alamat berhasil dihapus.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/products:
    get:
      tags:
        - Products
      summary: Ambil semua produk
      responses:
        "200":
          description: Daftar produk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      tags:
        - Products
      summary: Buat produk baru
      description: Membutuhkan Bearer token dengan role admin atau owner. Gambar wajib berupa file image maksimal 2 MB.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProductCreateForm"
      responses:
        "201":
          description: Produk berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/products/{id}:
    parameters:
      - $ref: "#/components/parameters/ProductId"
    get:
      tags:
        - Products
      summary: Ambil produk berdasarkan id
      responses:
        "200":
          description: Detail produk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Products
      summary: Update produk
      description: Membutuhkan Bearer token dengan role admin atau owner. Gambar opsional; jika dikirim, gambar lama akan dihapus.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProductUpdateForm"
      responses:
        "200":
          description: Produk berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Products
      summary: Hapus produk
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Produk berhasil dihapus.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/products/category:
    get:
      tags:
        - Categories
      summary: Ambil semua kategori
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar kategori.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Categories
      summary: Buat kategori
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameRequest"
            example:
              name: Beras
      responses:
        "201":
          description: Kategori berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/products/category/{id}:
    parameters:
      - $ref: "#/components/parameters/CategoryId"
    get:
      tags:
        - Categories
      summary: Ambil kategori berdasarkan id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Detail kategori.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Categories
      summary: Update kategori
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameRequest"
            example:
              name: Sembako
      responses:
        "200":
          description: Kategori berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/products/type:
    get:
      tags:
        - Types
      summary: Ambil semua tipe produk
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar tipe produk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TypeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Types
      summary: Buat tipe produk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameRequest"
            example:
              name: Premium
      responses:
        "201":
          description: Tipe berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TypeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/products/type/{id}:
    parameters:
      - $ref: "#/components/parameters/TypeId"
    get:
      tags:
        - Types
      summary: Ambil tipe produk berdasarkan id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Detail tipe produk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TypeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Types
      summary: Update tipe produk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameRequest"
            example:
              name: Medium
      responses:
        "200":
          description: Tipe berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TypeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/carts:
    get:
      tags:
        - Cart
      summary: Ambil isi keranjang
      description: Mengambil item keranjang dan summary harga barang. Ongkir dan grand total belum dihitung di cart karena alamat dipilih pada halaman checkout.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Detail keranjang.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      tags:
        - Cart
      summary: Kosongkan keranjang
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Keranjang berhasil dikosongkan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/carts/items:
    post:
      tags:
        - Cart
      summary: Tambah produk ke keranjang
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemCreateRequest"
            example:
              product_id: 1
              quantity: 2
      responses:
        "201":
          description: Produk berhasil ditambahkan ke keranjang.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/carts/items/{productId}:
    parameters:
      - $ref: "#/components/parameters/CartProductId"
    patch:
      tags:
        - Cart
      summary: Update jumlah item keranjang
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdateRequest"
            example:
              quantity: 3
      responses:
        "200":
          description: Item keranjang berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Cart
      summary: Hapus item dari keranjang
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Item keranjang berhasil dihapus.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/orders:
    post:
      tags:
        - Orders
      summary: Checkout cart menjadi order
      description: >
        Membuat order dari isi cart pengguna yang sedang login. Backend akan
        mengambil alamat berdasarkan address_id, menghitung subtotal barang,
        menghitung ongkir berdasarkan jarak alamat ke toko, membuat order dan
        order item, mengurangi stok produk, lalu mengosongkan cart. Alamat
        delivery harus sudah memiliki koordinat latitude dan longitude.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
            example:
              address_id: 1
              notes: Tolong kirim sore hari
      responses:
        "201":
          description: Order berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    get:
      tags:
        - Orders
      summary: Ambil daftar order milik pengguna
      description: >
        Mengambil daftar order milik pengguna yang sedang login. Bisa difilter
        berdasarkan status, payment_status, dan fulfillment_method. Jika query
        page, limit, atau per_page dikirim, response akan menyertakan meta
        pagination.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
          example: PENDING
        - name: payment_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaymentStatus"
          example: UNPAID
        - name: fulfillment_method
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FulfillmentMethod"
          example: DELIVERY
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Nomor halaman history order. Jika dikirim, response menyertakan meta pagination.
          example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Jumlah order per halaman. Maksimal 50.
          example: 10
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          description: Alias untuk limit.
          example: 10
      responses:
        "200":
          description: Daftar order milik pengguna.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/orders/pickup:
    post:
      tags:
        - Orders
      summary: Checkout cart menjadi order pickup
      description: >
        Membuat order dari isi cart pengguna yang sedang login untuk pengambilan
        sendiri di toko. Backend akan menghitung subtotal barang, membuat order
        dan order item, mengurangi stok produk, mengosongkan cart, dan
        menetapkan shippingFee menjadi 0.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderPickupCreateRequest"
            example:
              notes: Akan diambil sore hari
      responses:
        "201":
          description: Order pickup berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPickupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/orders/{id}:
    parameters:
      - $ref: "#/components/parameters/OrderId"

    get:
      tags:
        - Orders
      summary: Ambil detail order milik pengguna
      description: Mengambil detail order berdasarkan id, hanya jika order tersebut milik pengguna yang sedang login.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Detail order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/orders/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/OrderId"

    patch:
      tags:
        - Orders
      summary: Batalkan order milik pengguna
      description: >
        Membatalkan order milik pengguna yang sedang login. Untuk MVP,
