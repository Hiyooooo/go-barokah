  /api/admin/orders:
    get:
      tags:
        - Admin Orders
      summary: Ambil semua order untuk admin
      description: >
        Mengambil semua order dari semua pengguna. Endpoint ini untuk operasional
        admin. Owner dapat mengakses endpoint ini jika masuk ke halaman admin.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
          example: PENDING
        - name: payment_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaymentStatus"
          example: UNPAID
      responses:
        "200":
          description: Daftar semua order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderAdminListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/orders/{id}:
    parameters:
      - $ref: "#/components/parameters/OrderId"

    get:
      tags:
        - Admin Orders
      summary: Ambil detail order untuk admin
      description: Mengambil detail order berdasarkan id untuk kebutuhan operasional admin.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Detail order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/orders/{id}/status:
    parameters:
      - $ref: "#/components/parameters/OrderId"

    patch:
      tags:
        - Admin Orders
      summary: Update status order
      description: >
        Update status order oleh admin. Status transition yang disarankan:
        PENDING ke PROCESSING atau CANCELLED, PROCESSING ke SHIPPED atau
        CANCELLED, dan SHIPPED ke COMPLETED.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdateRequest"
            example:
              status: PROCESSING
      responses:
        "200":
          description: Status order berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatusUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/orders/{id}/payment-status:
    parameters:
      - $ref: "#/components/parameters/OrderId"

    patch:
      tags:
        - Admin Orders
      summary: Update payment status order
      description: >
        Update payment status secara manual/dummy oleh admin. Jika payment_status
        diubah menjadi PAID, backend akan mengisi paidAt.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderPaymentStatusUpdateRequest"
            example:
              payment_status: PAID
      responses:
        "200":
          description: Payment status berhasil diupdate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPaymentStatusUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /me:
    get:
      tags:
        - Users
      summary: Cek payload token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token valid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Protected route
                  user:
                    $ref: "#/components/schemas/TokenUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    TypeId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    AddressId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    CartProductId:
      name: productId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1

  responses:
    BadRequest:
      description: Request tidak valid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Bad request
    Unauthorized:
      description: Token tidak ada, format salah, tidak valid, atau expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Authentication token is required
    Forbidden:
      description: Role tidak memiliki akses.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Forbidden
    NotFound:
      description: Resource tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Resource not found
    Conflict:
      description: Data bentrok dengan data yang sudah ada.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Name already exists
    InternalServerError:
      description: Terjadi kesalahan server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Internal server error

  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    TokenUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          nullable: true
        role:
          type: string
          example: user

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        username:
          type: string
        phone_number:
          type: string
          nullable: true
          example: "081234567890"
      required:
        - email
        - password
        - username

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        username:
          type: string
        phone_number:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        role:
          type: string
          example: user
        createdAt:
          type: string
          format: date-time

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: Successfully register
        data:
          type: object
          properties:
            account:
              $ref: "#/components/schemas/AuthAccount"
            message:
              type: string
              example: OTP has been sent to your email

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Successfully login
        data:
          type: object
          properties:
            account:
              $ref: "#/components/schemas/AuthAccount"
            token:
              type: string
              description: JWT untuk header Authorization.

    OtpRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    OtpVerifyRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          pattern: "^[0-9]{6}$"
      required:
        - email
        - otp

    UpdateAccountRequest:
      type: object
      properties:
        username:
          type: string
