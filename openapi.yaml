        - Akun dengan email tersebut harus terdaftar
        - Akun belum berstatus `admin` (jika sudah admin, return 409)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeEmailRequest"
            example:
              email: budi@example.com
      responses:
        "200":
          description: Akun berhasil dipromosikan menjadi admin.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/UserRecord"
              example:
                message: Successfully promoted account to admin
                data:
                  id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: Budi Santoso
                  email: budi@example.com
                  role: admin
                  phoneNumber: "081234567890"
                  emailVerified: true
                  createdAt: "2025-01-15T08:00:00.000Z"
                  updatedAt: "2025-06-30T10:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/owner/employee/demote:
    patch:
      tags:
        - Employee
      summary: Demote admin menjadi user
      description: |
        Mengubah role akun dari `admin` menjadi `user`.
        Hanya dapat diakses oleh owner.

        Aturan validasi:
        - Email harus berformat valid
        - Akun dengan email tersebut harus terdaftar
        - Akun harus berstatus `admin` (jika bukan admin, return 400)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeEmailRequest"
            example:
              email: dina@example.com
      responses:
        "200":
          description: Akun berhasil diturunkan menjadi user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/UserRecord"
              example:
                message: Successfully demoted account to user
                data:
                  id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                  name: Dina Purnama
                  email: dina@example.com
                  role: user
                  phoneNumber: "082345678901"
                  emailVerified: true
                  createdAt: "2025-02-10T09:00:00.000Z"
                  updatedAt: "2025-06-30T11:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    TypeId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    AddressId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    CartProductId:
      name: productId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    StartDateParam:
      name: startDate
      in: query
      required: true
      schema:
        type: string
        format: date
      description: Start date of the analysis period (YYYY-MM-DD). Inclusive.
      example: "2025-06-01"
    EndDateParam:
      name: endDate
      in: query
      required: true
      schema:
        type: string
        format: date
      description: End date of the analysis period (YYYY-MM-DD). Inclusive.
      example: "2025-06-30"

  responses:
    BadRequest:
      description: Request tidak valid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Bad request
    Unauthorized:
      description: Token tidak ada, format salah, tidak valid, atau expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Authentication token is required
    Forbidden:
      description: Role tidak memiliki akses.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Forbidden
    NotFound:
      description: Resource tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Resource not found
    Conflict:
      description: Data bentrok dengan data yang sudah ada.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Name already exists
    InternalServerError:
      description: Terjadi kesalahan server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Internal server error

  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AccountSummary:
      type: object
      properties:
        name:
          type: string
          example: Budi Santoso
        email:
          type: string
          format: email
          example: budi@example.com
        role:
          type: string
          enum: [user, admin, owner]
          example: user

    EmployeeEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: budi@example.com

    UserRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          type: string
          example: Budi Santoso
        email:
          type: string
          format: email
          example: budi@example.com
        role:
          type: string
          enum: [user, admin, owner]
          example: admin
        phoneNumber:
          type: string
          nullable: true
          example: "081234567890"
        emailVerified:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2025-01-15T08:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-06-30T10:00:00.000Z"

    TokenUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          nullable: true
        role:
          type: string
          example: user

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        username:
          type: string
        phone_number:
          type: string
          nullable: true
          example: "081234567890"
      required:
        - email
        - password
        - username

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        username:
          type: string
          description: Nama pengguna (dipetakan dari kolom `name` di database).
        phone_number:
          type: string
          nullable: true
        role:
          type: string
          example: user
        createdAt:
          type: string
          format: date-time

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: Successfully register
        data:
          type: object
          properties:
            account:
              $ref: "#/components/schemas/AuthAccount"
            message:
              type: string
              example: OTP has been sent to your email

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Successfully login
        data:
          type: object
          properties:
            account:
              $ref: "#/components/schemas/AuthAccount"
            token:
              type: string
              description: JWT untuk header Authorization.

    OtpRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    OtpVerifyRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          pattern: "^[0-9]{6}$"
      required:
        - email
        - otp

    UpdateAccountRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        phone_number:
          type: string
          nullable: true
          example: "081234567890"
      required:
        - username

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        phoneNumber:
          type: string
          nullable: true
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserProfileResponse:
      type: object
      properties:
        message:
          type: string
          example: Success update account
        data:
          $ref: "#/components/schemas/UserProfile"

    AddressCreateRequest:
      type: object
      properties:
        label:
          type: string
        recipient_name:
          type: string
        recipient_phone:
          type: string
          example: "081234567890"
        address_detail:
          type: string
        courier_note:
          type: string
          nullable: true
          description: Catatan tambahan untuk kurir, misalnya patokan rumah atau instruksi titip paket.
          example: Pagar hijau, rumah kedua dari pojok
        latitude:
          type: number
          format: float
          description: Koordinat latitude alamat dari peta.
          example: -7.9666
        longitude:
          type: number
          format: float
          description: Koordinat longitude alamat dari peta.
          example: 112.6326
        is_default:
          type: boolean
          default: false
      required:
        - label
        - recipient_name
        - recipient_phone
        - address_detail
        - latitude
        - longitude

    AddressUpdateRequest:
      type: object
      properties:
        label:
          type: string
        recipient_name:
          type: string
        recipient_phone:
          type: string
          example: "081234567890"
        address_detail:
          type: string
        courier_note:
          type: string
          nullable: true
          description: Catatan tambahan untuk kurir.
          example: Titip ke tetangga sebelah jika rumah kosong
        latitude:
          type: number
          format: float
          description: Koordinat latitude alamat dari peta.
          example: -7.9666
        longitude:
          type: number
          format: float
          description: Koordinat longitude alamat dari peta.
          example: 112.6326
        is_default:
          type: boolean

    Address:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
          format: uuid
        label:
          type: string
        recipientName:
          type: string
        recipientPhone:
          type: string
        addressDetail:
          type: string
        courierNote:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AddressResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/Address"

    AddressListResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/Address"

    NameRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CategoryResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/Category"

    CategoryListResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/Category"

    Type:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TypeResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/Type"

    TypeListResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/Type"

    ProductCreateForm:
      type: object
      properties:
        name:
          type: string
        price:
          type: string
          example: "35000"
        cost:
          type: string
          description: Harga modal (HPP) per unit produk. Opsional; default 0 jika tidak diisi.
          example: "20000"
        description:
          type: string
        category_id:
          type: string
          example: "1"
        type_id:
          type: string
          example: "1"
        stock:
          type: string
          example: "20"
        discount_amount:
          type: string
          description: Persentase diskon 0 sampai 100.
          example: "10"
        image:
          type: string
          format: binary
      required:
        - name
        - price
        - description
        - category_id
        - type_id
        - stock
        - image

    ProductUpdateForm:
      type: object
      properties:
        name:
          type: string
        price:
          type: string
          example: "35000"
        cost:
          type: string
          description: Harga modal (HPP) per unit produk.
          example: "20000"
        description:
          type: string
        category_id:
          type: string
          example: "1"
        type_id:
          type: string
          example: "1"
        stock:
          type: string
          example: "20"
        discount_amount:
          type: string
          description: Persentase diskon 0 sampai 100.
          example: "10"
        image:
          type: string
          format: binary

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        categoryId:
          type: integer
        typeId:
          type: integer
        price:
          type: number
          format: float
          description: Harga jual per unit produk.
        cost:
          type: number
          format: float
          description: Harga modal (HPP) per unit produk. Digunakan untuk menghitung gross profit.
          example: 20000
        description:
          type: string
        image_url:
          type: string
          example: /uploads/products/1778020496326-product.jpg
        stock:
          type: integer
        discount_amount:
          type: integer
          minimum: 0
          maximum: 100
          description: Persentase diskon produk (0–100).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        category:
          $ref: "#/components/schemas/Category"
        type:
          $ref: "#/components/schemas/Type"
        final_price:
          type: integer
          description: Harga jual setelah diskon. Dihitung oleh backend saat response.

    ProductResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/Product"

    ProductListResponse:
      type: object
      properties:
        message:
          type: string
          example: Success get all products
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"

    ProductDeleteResponse:
      type: object
      properties:
        message:
          type: string
          example: Success delete product
        data:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            categoryId:
              type: integer
            typeId:
              type: integer
            price:
              type: number
            cost:
              type: number
              description: Harga modal (HPP) per unit produk.
            description:
              type: string
            image_url:
              type: string
            stock:
              type: integer
            discount_amount:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    CartItemCreateRequest:
      type: object
      properties:
        product_id:
          type: integer
          minimum: 1
        quantity:
          type: integer
          minimum: 1
          default: 1
      required:
        - product_id

    CartItemUpdateRequest:
      type: object
      properties:
        quantity:
          type: integer
          minimum: 1
      required:
        - quantity

    CartItem:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        name:
          type: string
        image_url:
          type: string
        price:
          type: number
        discount_amount:
          type: number
        final_price:
          type: integer
        quantity:
          type: integer
        normal_subtotal:
          type: number
        discount_subtotal:
          type: number
        subtotal:
          type: number
        stock:
          type: integer

    CartSummary:
      type: object
      description: Ringkasan harga barang di cart. Tidak termasuk ongkir dan grand total final checkout.
      properties:
        items_count:
          type: integer
          description: Jumlah jenis produk di cart.
        total_quantity:
          type: integer
          description: Total semua quantity produk di cart.
        normal_subtotal:
          type: number
          description: Total harga barang sebelum diskon produk.
        discount_total:
          type: number
          description: Total potongan diskon produk.
        subtotal:
          type: number
          description: Total harga barang setelah diskon produk. Ongkir dihitung di checkout.

    Cart:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        user_id:
          type: string
          format: uuid
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        summary:
          $ref: "#/components/schemas/CartSummary"

    CartResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/Cart"

    OrderStatus:
      type: string
      enum:
        - PENDING
        - PROCESSING
        - SHIPPED
        - COMPLETED
        - CANCELLED
      example: PENDING

    PaymentStatus:
      type: string
      enum:
        - UNPAID
        - PAID
        - FAILED
        - REFUNDED
      example: UNPAID

    FulfillmentMethod:
      type: string
      enum:
        - DELIVERY
        - PICKUP
      example: DELIVERY

    OrderCreateRequest:
      type: object
      properties:
        address_id:
          type: integer
          minimum: 1
          description: ID alamat milik pengguna yang akan dipakai sebagai alamat pengiriman.
        notes:
          type: string
          nullable: true
          description: Catatan opsional untuk order.
      required:
        - address_id

    OrderPickupCreateRequest:
      type: object
      properties:
        notes:
          type: string
          nullable: true
          description: Catatan opsional untuk order pickup.

    OrderStatusUpdateRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
      required:
        - status

    OrderPaymentStatusUpdateRequest:
      type: object
      properties:
        payment_status:
          $ref: "#/components/schemas/PaymentStatus"
      required:
        - payment_status

    OrderUser:
      type: object
      description: Data ringkas pengguna pemilik order.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          nullable: true

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productImageUrl:
          type: string
          nullable: true
          example: /uploads/products/1778020496326-product.jpg
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          format: float
          description: Harga produk sebelum diskon pada saat checkout.
        discountAmount:
          type: integer
          minimum: 0
          maximum: 100
          description: Persentase diskon produk pada saat checkout.
        finalUnitPrice:
          type: number
          format: float
          description: Harga produk setelah diskon pada saat checkout.
        normalSubtotal:
          type: number
          format: float
          description: unitPrice dikali quantity.
        discountSubtotal:
          type: number
          format: float
          description: Total potongan diskon untuk item ini.
        subtotal:
          type: number
          format: float
          description: finalUnitPrice dikali quantity.
        unitCost:
          type: number
          format: float
          description: Harga modal per unit pada saat checkout.
        totalCost:
          type: number
          format: float
          description: unitCost dikali quantity.
        grossProfit:
          type: number
          format: float
          description: subtotal dikurangi totalCost.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
          format: uuid
        addressId:
          type: integer
          nullable: true
        orderNumber:
          type: string
          example: ORD-20260603-1780000000000-1234
        fulfillmentMethod:
          $ref: "#/components/schemas/FulfillmentMethod"
        status:
          $ref: "#/components/schemas/OrderStatus"
        paymentStatus:
          $ref: "#/components/schemas/PaymentStatus"
        recipientName:
          type: string
        recipientPhone:
          type: string
          example: "081234567890"
        shippingAddress:
          type: string
        normalSubtotal:
          type: number
          format: float
          description: Total harga barang sebelum diskon produk.
        discountTotal:
          type: number
          format: float
          description: Total potongan diskon produk.
        itemsSubtotal:
          type: number
          format: float
          description: Total harga barang setelah diskon produk.
        shippingFee:
          type: number
          format: float
          description: Ongkir dummy hasil perhitungan checkout. Untuk PICKUP selalu 0.
        grandTotal:
          type: number
          format: float
          description: itemsSubtotal ditambah shippingFee.
        totalCost:
          type: number
          format: float
          description: Total modal seluruh item order.
        grossProfit:
          type: number
          format: float
          description: Laba kotor order. Dihitung dari itemsSubtotal dikurangi totalCost (tidak termasuk ongkos kirim).
        notes:
          type: string
          nullable: true
        snapToken:
          type: string
          nullable: true
          description: Snap token dari Midtrans untuk menampilkan popup pembayaran. Null jika belum pernah request payment atau PICKUP.
        paymentUrl:
          type: string
          nullable: true
          description: URL redirect Midtrans Snap. Null jika belum ada snap token.
          example: "https://app.sandbox.midtrans.com/snap/v3/redirection/abc123"
        midtransOrderId:
          type: string
          nullable: true
          description: Order ID yang dikirim ke Midtrans. Pertama kali sama dengan orderNumber; saat retry token expired akan ditambahkan timestamp.
          example: "ORD-20260624-1780000000000-4321"
        snapTokenCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: Waktu snap token dibuat. Dipakai untuk mengecek apakah token masih valid (< 24 jam).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        user:
          $ref: "#/components/schemas/OrderUser"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderResponse:
      type: object
      properties:
        message:
          type: string
          example: Success create order
        data:
          $ref: "#/components/schemas/Order"

    OrderPickupResponse:
      type: object
      properties:
        message:
          type: string
          example: Success create pickup order
        data:
          $ref: "#/components/schemas/Order"

    OrderDetailResponse:
      type: object
      properties:
        message:
          type: string
          example: Success get order
        data:
          $ref: "#/components/schemas/Order"

    ShippingFeeResponse:
      type: object
      properties:
        message:
          type: string
          example: Success calculate shipping fee
        data:
          type: object
          properties:
            addressId:
              type: integer
              example: 1
            distanceKm:
              type: number
              format: float
              example: 5.4
            shippingFee:
              type: number
              example: 12000
            itemsSubtotal:
              type: number
              example: 75000
            grandTotal:
              type: number
              example: 87000

    OrderCancelResponse:
      type: object
      properties:
        message:
          type: string
          example: Success cancel order
        data:
          $ref: "#/components/schemas/Order"

    OrderStatusUpdateResponse:
      type: object
      properties:
        message:
          type: string
          example: Success update order status
        data:
          $ref: "#/components/schemas/Order"

    OrderPaymentStatusUpdateResponse:
      type: object
      properties:
        message:
          type: string
          example: Success update payment status
        data:
          $ref: "#/components/schemas/Order"

    OrderListResponse:
      type: object
      properties:
        message:
          type: string
          example: Success get orders
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    OrderAdminListResponse:
      type: object
      properties:
        message:
          type: string
          example: Success get all orders
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"

    PaginationMeta:
      type: object
      description: Muncul pada response list jika request memakai query page, limit, atau per_page.
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 50
          example: 10
        total:
          type: integer
          minimum: 0
          example: 25
        totalPages:
          type: integer
          minimum: 0
          example: 3

    InitiatePaymentResponse:
      type: object
      properties:
        message:
          type: string
          example: Berhasil mendapatkan token pembayaran
        data:
          type: object
          properties:
            snap_token:
              type: string
              description: Token Midtrans Snap yang digunakan di frontend untuk menampilkan popup pembayaran via window.snap.pay(token).
              example: "abc123token-xyz..."
            payment_url:
              type: string
              description: URL redirect Midtrans jika frontend tidak menggunakan Snap.js popup (fallback redirect).
              example: "https://app.sandbox.midtrans.com/snap/v3/redirection/abc123token-xyz"
            order_number:
              type: string
              description: Nomor order untuk ditampilkan di UI.
              example: "ORD-20260624-1780000000000-4321"
            grand_total:
              type: number
              format: float
              description: Total yang harus dibayar. Gunakan ini untuk menampilkan nominal di UI sebelum popup Midtrans muncul.
              example: 152000

    MidtransNotificationRequest:
      type: object
      description: Payload webhook yang dikirim oleh server Midtrans. Tidak perlu dibuat manual — ini adalah dokumentasi untuk referensi.
      properties:
        order_id:
          type: string
          description: midtransOrderId yang disimpan di DB (sama dengan orderNumber atau orderNumber-timestamp saat retry).
          example: "ORD-20260624-1780000000000-4321"
        status_code:
          type: string
          description: Kode status HTTP dari transaksi Midtrans.
          example: "200"
        gross_amount:
          type: string
          description: Total pembayaran dalam bentuk string desimal.
          example: "152000.00"
        transaction_status:
          type: string
          enum:
            - settlement
            - capture
            - pending
            - deny
            - expire
            - cancel
          example: settlement
        fraud_status:
          type: string
          nullable: true
          enum:
            - accept
            - challenge
            - deny
          description: Status fraud detection. Relevan saat transaction_status = capture.
          example: accept
        signature_key:
          type: string
          description: |
            Hash SHA512 untuk verifikasi keaslian notifikasi. Dihitung dengan:
            SHA512(order_id + status_code + gross_amount + MIDTRANS_SERVER_KEY)
          example: "d1312a11e44bb74903982f5aad0e967a0b93b97fa553..."
        payment_type:
          type: string
          description: Metode pembayaran yang digunakan.
          example: "gopay"
        transaction_id:
          type: string
          description: ID unik transaksi dari Midtrans.
          example: "513f1f01-c9da-474c-9fc9-d5c64364b709"
        transaction_time:
          type: string
          description: Waktu transaksi dibuat di Midtrans.
          example: "2026-06-24 06:00:00"
        settlement_time:
          type: string
          nullable: true
          description: Waktu settlement (hanya ada jika transaction_status = settlement).
          example: "2026-06-24 06:01:00"
        currency:
          type: string
          example: "IDR"
      required:
        - order_id
        - status_code
        - gross_amount
        - signature_key
        - transaction_status

    # ── Expense ──────────────────────────────────────────────────────────────

    ExpenseCategory:
      type: string
      enum: [SALARY, RENT, UTILITIES, DEPRECIATION, TAX, OTHER]
      example: SALARY

    ExpenseRequest:
      type: object
      properties:
        category:
          $ref: "#/components/schemas/ExpenseCategory"
        description:
          type: string
          example: Gaji karyawan bulan Juni 2025
        amount:
          type: number
          minimum: 0
          example: 3000000
        date:
          type: string
          format: date
          example: "2025-06-30"
      required:
        - category
        - description
        - amount
        - date

    Expense:
      type: object
      properties:
        id:
          type: integer
          example: 1
        category:
          $ref: "#/components/schemas/ExpenseCategory"
        description:
          type: string
          example: Gaji karyawan bulan Juni 2025
        amount:
          type: number
          example: 3000000
        date:
          type: string
          format: date
          example: "2025-06-30"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ExpenseResponse:
      type: object
      properties:
        message:
          type: string
          example: Pengeluaran berhasil ditambahkan
        data:
          $ref: "#/components/schemas/Expense"

    # ── Analytics ─────────────────────────────────────────────────────────────

    AnalyticsPeriod:
      type: object
      properties:
        start_date:
          type: string
          format: date
          example: "2025-06-01"
        end_date:
          type: string
          format: date
          example: "2025-06-30"

    OmzetResponse:
      type: object
      properties:
        period:
          $ref: "#/components/schemas/AnalyticsPeriod"
        omzet:
          type: number
          description: Total omzet dari penjualan produk (itemsSubtotal), tidak termasuk ongkos kirim.
          example: 15000000
        total_discount:
          type: number
          description: Total diskon yang diberikan pada semua order PAID.
          example: 500000
        total_transactions:
          type: integer
          description: Jumlah order yang sudah PAID dalam periode tersebut.
          example: 30
        average_per_transaction:
          type: number
          description: Rata-rata omzet per transaksi (omzet dibagi jumlah transaksi).
          example: 500000
        per_product:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
                example: 1
              product_name:
                type: string
                example: Kompor Gas
              qty_sold:
                type: integer
                example: 50
              revenue:
                type: number
                example: 5000000
              cogs:
                type: number
                example: 3000000
              gross_profit:
                type: number
                example: 2000000

    NetProfitResponse:
      type: object
      properties:
        period:
          $ref: "#/components/schemas/AnalyticsPeriod"
        omzet:
          type: number
          description: Total omzet dari penjualan produk (itemsSubtotal, tidak termasuk ongkos kirim) dari order PAID.
          example: 150000000
        cogs:
          type: number
          description: HPP — akumulasi `orderItem.totalCost` (unitCost × qty) dari semua order PAID dalam periode.
          example: 95000000
        filter_1:
          type: object
          description: "Saringan 1: Laba Kotor = Omzet - HPP"
          properties:
            label:
              type: string
              example: Gross Profit
            value:
              type: number
              example: 55000000
            margin_percent:
              type: number
              example: 36.67
        operating_expenses:
          type: object
          properties:
            total:
              type: number
              description: Total biaya operasional (SALARY, RENT, UTILITIES, DEPRECIATION, OTHER — tidak termasuk TAX).
              example: 21000000
            breakdown:
              type: array
              description: Rincian pengeluaran per kategori dalam periode (mencakup semua kategori termasuk TAX, untuk keperluan tampilan).
              items:
                type: object
                properties:
                  category:
                    $ref: "#/components/schemas/ExpenseCategory"
                  amount:
                    type: number
                    example: 12000000
        filter_2:
          type: object
          description: "Saringan 2: Laba Operasional = Laba Kotor - Biaya Operasional"
          properties:
            label:
              type: string
              example: Operating Profit
            value:
              type: number
              example: 34000000
        tax:
          type: number
          description: Total pajak (kategori TAX).
          example: 1000000
        filter_3:
          type: object
          description: "Saringan 3: Laba Bersih = Laba Operasional - Pajak"
          properties:
            label:
              type: string
              example: Net Profit
            value:
              type: number
              example: 33000000
            margin_percent:
              type: number
              example: 22.0

    CashFlowResponse:
      type: object
      properties:
        period:
          $ref: "#/components/schemas/AnalyticsPeriod"
        cash_in:
          type: object
          properties:
            total:
              type: number
              description: Total uang masuk (grandTotal termasuk ongkos kirim).
              example: 55000000
            breakdown:
              type: object
              properties:
                product_sales:
                  type: number
                  example: 50000000
                shipping_fee_received:
                  type: number
                  example: 5000000
        cash_out:
          type: object
          properties:
            total:
              type: number
              description: Total uang keluar (HPP + semua pengeluaran).
              example: 40000000
            breakdown:
              type: object
              properties:
                cogs:
                  type: number
                  example: 30000000
                operating_expenses:
                  type: number
                  example: 10000000
        net_cash_flow:
          type: number
          description: Selisih uang masuk dikurangi uang keluar.
          example: 15000000
        status:
          type: string
          enum: [POSITIVE, BREAK_EVEN, NEGATIVE]
          example: POSITIVE

    CostAnalysisResponse:
      type: object
      properties:
        period:
          $ref: "#/components/schemas/AnalyticsPeriod"
        total_cost:
          type: number
          description: Total seluruh pengeluaran dalam periode tersebut.
          example: 21000000
        monthly_average:
          type: number
          description: Total biaya dibagi jumlah bulan dalam rentang tanggal.
          example: 21000000
        breakdown:
          type: array
          items:
            type: object
            properties:
              category:
                $ref: "#/components/schemas/ExpenseCategory"
              total:
                type: number
                example: 12000000
              percent:
                type: number
                description: Persentase kontribusi kategori ini terhadap total biaya.
                example: 57.14
        monthly_trend:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
                description: Bulan dalam format YYYY-MM.
                example: "2025-06"
              total:
                type: number
                example: 21000000
